name: CI — Validate & Build Check

# ─────────────────────────────────────────────────────────────────────────────
# 触发条件：
#   1. 所有 PR（确保合并前通过验证）
#   2. push 到 main（双重保险）
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'client/public/benchmarks.json'
      - 'benchmarks.json'
      - 'client/src/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: 数据验证
  # ───────────────────────────────────────────────────────────────────────────
  validate-data:
    name: Validate benchmarks.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validation script
        id: validate
        run: |
          python3 scripts/validate_benchmarks.py 2>&1 | tee /tmp/validate_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Count benchmark entries
        run: |
          COUNT=$(python3 -c "import json; data=json.load(open('client/public/benchmarks.json')); print(len(data))")
          echo "📊 Total benchmarks: **$COUNT**" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: TypeScript 类型检查
  # ───────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3: 构建验证（确保 GitHub Pages 构建成功）
  # ───────────────────────────────────────────────────────────────────────────
  build-check:
    name: Build Check (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [validate-data, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        run: pnpm build:ghpages
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          echo "## 📦 Build Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh dist-ghpages/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          # 确认关键文件存在
          test -f dist-ghpages/index.html && echo "✅ index.html exists" || (echo "❌ index.html missing" && exit 1)
          test -f dist-ghpages/benchmarks.json && echo "✅ benchmarks.json exists" || (echo "❌ benchmarks.json missing" && exit 1)
          echo "✅ Build check passed" >> $GITHUB_STEP_SUMMARY
