name: Validate Benchmark Data

on:
  push:
    paths:
      - 'client/public/benchmarks.json'
  pull_request:
    paths:
      - 'client/public/benchmarks.json'

jobs:
  validate:
    name: Validate benchmarks.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validation script
        run: python3 scripts/validate_benchmarks.py

  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build (GitHub Pages)
        run: pnpm build:ghpages
