name: Bug Report
description: Report a bug or display issue on the website
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: dropdown
    id: bug_type
    attributes:
      label: Bug Type
      options:
        - Page rendering issue (blank screen, broken layout)
        - Search / filter not working
        - PDF not loading
        - Mermaid flowchart not rendering
        - Data error (wrong info for a specific benchmark)
        - Other
    validations:
      required: true

  - type: input
    id: benchmark_name
    attributes:
      label: Affected Benchmark (if applicable)
      description: Which benchmark is affected? Leave blank if it's a general issue.
      placeholder: e.g., MMLU-Pro

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g., Chrome 120 on macOS 14
