name: Submit New Benchmark
description: Suggest a new LLM benchmark to be added to the database
title: "[Benchmark] "
labels: ["new-benchmark"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing! Please fill in as much information as possible.
        Fields marked with * are required. You don't need to fill in every field — the maintainer will help complete missing details.

  - type: input
    id: name
    attributes:
      label: "* Benchmark Name"
      description: Official name of the benchmark (e.g., MMLU, SWE-bench, GAIA)
      placeholder: e.g., MyBench
    validations:
      required: true

  - type: input
    id: paper_url
    attributes:
      label: "* Paper URL"
      description: Link to the arXiv paper or official publication
      placeholder: https://arxiv.org/abs/xxxx.xxxxx
    validations:
      required: true

  - type: input
    id: homepage_url
    attributes:
      label: Homepage / GitHub URL
      description: Official project page or GitHub repository
      placeholder: https://github.com/...

  - type: dropdown
    id: l1_category
    attributes:
      label: "* Primary Capability Category (L1)"
      description: Which capability dimension does this benchmark primarily evaluate?
      options:
        - General Language
        - Agent Capability
        - Multimodal
        - Code
        - Science & Reasoning
        - Safety & Alignment
        - Math
        - Long Context
        - Medical & Health
        - Video Understanding
        - Chart & Document
        - Spatial & 3D
        - Other (describe in notes)
    validations:
      required: true

  - type: input
    id: l2_subcategory
    attributes:
      label: L2 Subcategory
      description: More specific subcategory (e.g., "Code Agent", "Visual QA", "Instruction Following")
      placeholder: e.g., Code Agent

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty Level
      description: How challenging is this benchmark for current frontier models?
      options:
        - Frontier (state-of-the-art models score < 50%)
        - Expert (requires domain expertise)
        - Advanced (requires strong reasoning)
        - Basic (most models can attempt)
        - Unknown

  - type: input
    id: year
    attributes:
      label: Publication Year / Month
      description: When was this benchmark published?
      placeholder: "2025-06"

  - type: input
    id: institution
    attributes:
      label: Institution / Organization
      description: Which organization published this benchmark?
      placeholder: e.g., Stanford University, Google DeepMind

  - type: dropdown
    id: openness
    attributes:
      label: Data Openness
      description: Is the benchmark data publicly available?
      options:
        - Public (fully open)
        - Partly (partial release)
        - In-house (private / proprietary)
        - Unknown

  - type: input
    id: leaderboard_url
    attributes:
      label: Leaderboard URL
      description: Link to the official leaderboard (if any)
      placeholder: https://...

  - type: input
    id: pdf_cdn_url
    attributes:
      label: PDF URL (for inline reading)
      description: Direct link to the PDF file (arXiv PDF preferred, e.g., https://arxiv.org/pdf/xxxx.xxxxx)
      placeholder: https://arxiv.org/pdf/xxxx.xxxxx

  - type: dropdown
    id: modality
    attributes:
      label: Input Modality
      description: What type of input does this benchmark use?
      options:
        - Text only
        - Image
        - Video
        - Audio
        - Code
        - Multi-modal
        - Other

  - type: textarea
    id: description_en
    attributes:
      label: Description (English)
      description: A concise description of what this benchmark evaluates (2-4 sentences)
      placeholder: "MyBench is a benchmark that evaluates..."

  - type: textarea
    id: description_zh
    attributes:
      label: Description (Chinese, optional)
      description: 中文描述（可选，维护者会补充）
      placeholder: "MyBench 是一个用于评估..."

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any other relevant information (related benchmarks, family lineage, etc.)
